<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room Nivel Dios</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1e1e1e;
  color: white;
  text-align: center;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
.map {
  display: flex;
  justify-content: space-between;
  margin: 20px 0;
}
.stage {
  padding: 10px;
  border-radius: 8px;
  background: #555;
  opacity: 0.4;
}
.active { opacity: 1; background: #ff9800; }
.done { background: #4caf50; opacity: 1; }

.progress {
  width: 100%;
  background: #444;
  border-radius: 10px;
  overflow: hidden;
}
.bar {
  height: 15px;
  width: 0%;
  background: #4caf50;
}

button {
  padding: 10px;
  margin-top: 10px;
  background: #ff9800;
  border: none;
  cursor: pointer;
}
input {
  padding: 10px;
  width: 80%;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">
<p style="font-size: 10px;text-align: right;">Interactivo diseñado por el profesor <b>Edgar Herrera</b> con tecnología <a href="https://chatgpt.com">ChatGpt</a></p>
<h1>🎮 Ruta del Trapiche – Nivel Dios</h1>

<div class="progress"><div class="bar" id="bar"></div></div>
<p>⏱️ Tiempo: <span id="time">120</span>s</p>

<div class="map">
  <div class="stage active" id="s1">🌱</div>
  <div class="stage" id="s2">🔧</div>
  <div class="stage" id="s3">⚗️</div>
  <div class="stage" id="s4">🔥</div>
  <div class="stage" id="s5">🌀</div>
  <div class="stage" id="s6">🧱</div>
</div>

<div id="game">
  <h2 id="question"></h2>
  <input id="answer">
  <br>
  <button onclick="check()">Responder</button>
  <button onclick="hint()">💡 Pista</button>
  <p id="msg"></p>
</div>

<div id="end" class="hidden">
  <h2>🎉 ¡Escapaste!</h2>
  <p>Dominas el proceso de la panela 🔥</p>
</div>

</div>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b3c9b.mp3">
</audio>

<script>

let step = 0;
let progress = 0;

let questions = [
  {q:"Proceso inicial de la semilla", a:"germin", h:"Empieza por G"},
  {q:"Jugo de la caña", a:"guarapo", h:"Empieza por GUA"},
  {q:"Sustancia natural de limpieza", a:"mucil", h:"Empieza por MU"},
  {q:"Qué mide Brix", a:"azucar", h:"Dulce 😉"},
  {q:"Formación de cristales", a:"cristal", h:"Empieza por C"},
  {q:"Dar forma final", a:"moldeo", h:"Empieza por M"}
];

function load(){
  document.getElementById("question").innerText = questions[step].q;
}
load();

function check(){
  let val = answer.value.toLowerCase();
  if(val.includes(questions[step].a)){
    msg.innerHTML="✅ Correcto";
    document.getElementById("s"+(step+1)).classList.add("done");
    step++;
    progress += 16;
    bar.style.width = progress+"%";

    if(step < questions.length){
      document.getElementById("s"+(step+1)).classList.add("active");
      load();
      answer.value="";
    } else {
      game.classList.add("hidden");
      end.classList.remove("hidden");
    }

  } else {
    msg.innerHTML="❌ Error (-5s)";
    time -= 5;
  }
}

function hint(){
  msg.innerHTML="💡 "+questions[step].h;
}

let time = 120;
setInterval(()=>{
  time--;
  document.getElementById("time").innerText = time;
  if(time <= 0){
    msg.innerHTML="💀 Se acabó el tiempo";
    game.classList.add("hidden");
  }
},1000);

</script>

</body>
</html>
